<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashew - Оплата проезда</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: "Open Sans", "Segoe UI", Roboto, sans-serif;
            background-color: #f0f2f5; /* Цвет фона основного контента */
            color: rgba(0, 0, 0, .65);
            font-size: 14px;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* HEADER - Белый с тенью */
        header {
            background: #fff;
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); /* Тень для верхнего блока */
            z-index: 10;
        }

        .logo-img {
            height: auto;
            width: 60%;
        }

        /* MAIN CONTENT */
        main {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .ticket-card {
            background: #fff;
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-wrap: wrap;
            /* Увеличенная тень для основного блока */
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12); 
            border-radius: 4px;
            overflow: hidden;
        }

        /* Левая часть с Фото */
        .qr-section {
            flex: 1;
            min-width: 300px;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            border-right: 1px solid #f0f0f0;
            position: relative;
        }

        .qr-wrapper {
            position: relative;
            width: 260px;
            height: 260px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            padding: 10px;
            border-radius: 4px;
        }

        .qr-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 2px;
        }

        /* Правая часть с информацией */
        .info-section {
            flex: 1;
            min-width: 300px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Стили из твоего примера */
        .infoBlock___1uMAp {
            text-align: left;
        }

        .amountLabel___2dQrA, .descriptionLabel___2OmpC {
            opacity: .9;
            font-size: 21px;
            margin-bottom: 0;
            font-weight: 400;
            color: rgba(0, 0, 0, 0.65);
            margin-top: 24px;
        }
        
        /* Первый заголовок без отступа сверху */
        .infoBlock___1uMAp > div:first-child .amountLabel___2dQrA {
            margin-top: 0;
        }

        .additionalInf___3nXOK {
            font-size: 16px;
            white-space: pre-line;
            color: #000;
            font-weight: 600;
            margin-top: 4px;
            display: block;
        }

        .amount___ZlVZj, .description___HgXmR {
            word-break: break-all;
            white-space: pre-line;
            font-size: 19px; /* Базовый размер */
            color: #000;
            font-weight: 600;
            margin-top: 4px;
            display: block;
        }

        .description___HgXmR {
            color: #000;
        }

        @media (max-width: 991px) {
            .amount___ZlVZj, .description___HgXmR {
                font-size: 18px;
            }
            .amountLabel___2dQrA, .descriptionLabel___2OmpC {
                font-size: 18px;
            }
        }

        /* FOOTER - Синий #1890ff */
        footer {
            background: #1890ff;
            padding: 24px;
            text-align: center;
            color: #fff;
            font-size: 14px;
        }

        footer a {
            color: #fff;
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }

        /* Адаптив для мобильных */
        @media (max-width: 768px) {
            .ticket-card {
                flex-direction: column;
            }
            .qr-section {
                border-right: none;
                border-bottom: 1px solid #f0f0f0;
                padding: 24px;
            }
            .info-section {
                padding: 24px;
            }
            .qr-wrapper {
                width: 200px;
                height: 200px;
            }
        }
    </style>
</head>

    <script>
        function getParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        function decode(text) {
            if (!text) return "";
            try {
                return decodeURIComponent(text);
            } catch (e) {
                return text;
            }
        }

        // Функция для добавления 1 часа к строке времени
        function addOneHour(timeString) {
            if (!timeString) return "--";
            
            // Пробуем распарсить дату. Ожидаем формат dd.MM.yyyy HH:mm
            let cleanString = timeString.replace(/(\d{2})\.(\d{2})\.(\d{4})/, '$2/$1/$3');
            
            let date = new Date(cleanString);
            
            // Если дата невалидна, возвращаем как есть
            if (isNaN(date.getTime())) {
                return timeString;
            }

            // Добавляем 1 час
            date.setHours(date.getHours() + 1);

            // Форматируем обратно в dd.MM.yyyy HH:mm
            let day = String(date.getDate()).padStart(2, '0');
            let month = String(date.getMonth() + 1).padStart(2, '0');
            let year = date.getFullYear();
            let hours = String(date.getHours()).padStart(2, '0');
            let minutes = String(date.getMinutes()).padStart(2, '0');

            return `${day}.${month}.${year} ${hours}:${minutes}`;
        }

        window.onload = function() {
            const recipient = getParam('recipient');
            const activeFrom = getParam('activeFrom');
            const description = getParam('description');
            const price = getParam('price');

            if (recipient) document.getElementById('recipient').innerText = decode(recipient);
            
            if (activeFrom) {
                const decodedStart = decode(activeFrom);
                document.getElementById('active-from').innerText = decodedStart;
                
                // Рассчитываем время окончания (+1 час)
                const calculatedEnd = addOneHour(decodedStart);
                document.getElementById('active-to').innerText = calculatedEnd;
            }

            if (description) document.getElementById('description').innerText = decode(description);
            if (price) document.getElementById('price').innerText = decode(price);
        };
    </script>
</body>
</html>
